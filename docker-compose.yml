services:
  postgres:
    image: postgres:16-alpine
    container_name: agro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agro}
      POSTGRES_DB: ${POSTGRES_DB:-agro}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agro} -d ${POSTGRES_DB:-agro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agro-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agro-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-agro}:${POSTGRES_PASSWORD:-agro}@postgres:5432/${POSTGRES_DB:-agro}
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SAT_PROVIDER: ${SAT_PROVIDER:-mock}
      SH_CLIENT_ID: ${SH_CLIENT_ID:-}
      SH_CLIENT_SECRET: ${SH_CLIENT_SECRET:-}
      SH_TOKEN_URL: ${SH_TOKEN_URL:-}
      SH_STATS_URL: ${SH_STATS_URL:-}
      SAT_CRON_SECRET: ${SAT_CRON_SECRET:-}
      ENABLE_DEMO_MODE: ${ENABLE_DEMO_MODE:-0}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  postgres_data:
  redis_data:
